name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages

    on:
      push:
        branches: [ main ]

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: deploy-pages-${{ github.ref }}
      cancel-in-progress: true

    jobs:
      build-and-deploy:
        runs-on: ubuntu-latest
        environment:
          name: github-pages
          url: ${{ steps.deployment.outputs.page_url }}

        steps:
          - name: Checkout code
            uses: actions/checkout@v3
            with:
              fetch-depth: 0

          - name: Setup Node.js
            uses: actions/setup-node@v3
            with:
              node-version: '18'

          - name: Detect frontend package and build script
            id: check_build
            run: |
              if [ -f frontend/package.json ]; then
                echo "has_pkg=true" >> $GITHUB_OUTPUT
                if grep -q "\"build\"" frontend/package.json; then
                  echo "has_build=true" >> $GITHUB_OUTPUT
                else
                  echo "has_build=false" >> $GITHUB_OUTPUT
                fi
              else
                echo "has_pkg=false" >> $GITHUB_OUTPUT
                echo "has_build=false" >> $GITHUB_OUTPUT
              fi

          - name: Install frontend dependencies
            if: steps.check_build.outputs.has_pkg == 'true'
            working-directory: frontend
            run: npm ci

          - name: Build frontend
            if: steps.check_build.outputs.has_build == 'true'
            working-directory: frontend
            run: npm run build

          - name: Prepare deployment files
            id: prepare
            run: |
              if [ "${{ steps.check_build.outputs.has_build }}" = "true" ]; then
                # Default build output is frontend/dist - change if your project differs
                echo "DEPLOY_PATH=frontend/dist" >> $GITHUB_OUTPUT
              else
                echo "DEPLOY_PATH=frontend" >> $GITHUB_OUTPUT
              fi

          - name: Upload pages artifact
            uses: actions/upload-pages-artifact@v2
            with:
              path: ${{ steps.prepare.outputs.DEPLOY_PATH }}

          - name: Deploy to GitHub Pages
            id: deployment
            uses: actions/deploy-pages@v2
